\<app-header></app-header>

<main class="log-page">
  <div class="log-wrapper">

    <div class="log-box">

      <!-- Left Dark Panel -->
      <div class="log-panel">
        <p class="log-panel__eyebrow">Welcome back</p>
        <h1 class="log-panel__title">
          Login to your<br />
          Pawfect Companion account
        </h1>
        <p class="log-panel__text">
          Continue exploring dog breeds, care tips, and helpful guides for every dog owner in one simple place.
        </p>
      </div>

      <!-- Right White Form Panel -->
      <div class="log-form-panel">
        <h2 class="log-form-panel__title">Sign in</h2>
        <p class="log-form-panel__subtitle">Enter your email and password to continue</p>

        <form class="log-form" (ngSubmit)="onLogin()">

          <div class="log-form__group">
            <label for="email" class="log-form__label">Email</label>
            <input
              id="email"
              name="email"
              type="email"
              class="log-form__input"
              [(ngModel)]="email"
              placeholder="Enter your email"
              required
            />
          </div>

          <div class="log-form__group">
            <label for="password" class="log-form__label">Password</label>
            <input
              id="password"
              name="password"
              type="password"
              class="log-form__input"
              [(ngModel)]="password"
              placeholder="Enter your password"
              required
            />
          </div>

          <p class="log-form__error" *ngIf="errorMessage">{{ errorMessage }}</p>

          <button type="submit" class="log-form__button">Login</button>

        </form>

        <div class="log-form-panel__footer">
          <span>Don't have an account?</span>
          <a routerLink="/register">Register here</a>
        </div>
      </div>

    </div>
  </div>
</main>

<app-footer></app-footer>
