<app-header></app-header>

<main class="reg-page">
  <div class="reg-wrapper">

    <div class="reg-box">

      <!-- Left Panel (dark) -->
      <div class="reg-panel">
        <p class="reg-panel__eyebrow">Join us</p>
        <h1 class="reg-panel__title">
          Create your<br />
          Pawfect Companion account
        </h1>
        <p class="reg-panel__text">
          Start exploring dog breeds, care tips, and helpful guides made for every dog owner.
        </p>
      </div>

      <!-- Right Panel (white form) -->
      <div class="reg-form-panel">
        <h2 class="reg-form-panel__title">Register</h2>
        <p class="reg-form-panel__subtitle">Fill in your details to get started</p>

        <form class="reg-form" (ngSubmit)="onRegister()">

          <div class="reg-form__group">
            <label for="name" class="reg-form__label">Full Name</label>
            <input
              id="name"
              name="name"
              type="text"
              class="reg-form__input"
              [(ngModel)]="name"
              placeholder="Enter your full name"
              required
            />
          </div>

          <div class="reg-form__group">
            <label for="email" class="reg-form__label">Email</label>
            <input
              id="email"
              name="email"
              type="email"
              class="reg-form__input"
              [(ngModel)]="email"
              placeholder="Enter your email"
              required
            />
          </div>

          <div class="reg-form__group">
            <label for="password" class="reg-form__label">Password</label>
            <input
              id="password"
              name="password"
              type="password"
              class="reg-form__input"
              [(ngModel)]="password"
              placeholder="Enter your password"
              required
            />
          </div>

          <p class="reg-form__error" *ngIf="errorMessage">{{ errorMessage }}</p>

          <button type="submit" class="reg-form__button">Register</button>

        </form>

        <div class="reg-form-panel__footer">
          <span>Already have an account?</span>
          <a routerLink="/login">Login here</a>
        </div>
      </div>

    </div>
  </div>
</main>

<app-footer></app-footer>
