<app-header></app-header>

<main class="register-page">
  <section class="register-hero">
    <div class="register-hero__container">

      <div class="register-hero__content">
        <p class="register-hero__eyebrow">Join us</p>

        <h1 class="register-hero__title">
          Create your<br />
          Pawfect Companion account
        </h1>

        <p class="register-hero__text">
          Start exploring dog breeds, care tips, and helpful guides made for every dog owner.
        </p>
      </div>

      <div class="register-card">
        <h2 class="register-card__title">Register</h2>
        <p class="register-card__subtitle">
          Fill in your details to get started
        </p>

        <form class="register-form" (ngSubmit)="onRegister()">

          <div class="register-form__group">
            <label class="register-form__label">Full Name</label>
            <input
              type="text"
              [(ngModel)]="name"
              name="name"
              class="register-form__input"
              placeholder="Enter your full name"
              required
            />
          </div>

          <div class="register-form__group">
            <label class="register-form__label">Email</label>
            <input
              type="email"
              [(ngModel)]="email"
              name="email"
              class="register-form__input"
              placeholder="Enter your email"
              required
            />
          </div>

          <div class="register-form__group">
            <label class="register-form__label">Password</label>
            <input
              type="password"
              [(ngModel)]="password"
              name="password"
              class="register-form__input"
              placeholder="Enter your password"
              required
            />
          </div>

          <p class="register-form__error" *ngIf="errorMessage">
            {{ errorMessage }}
          </p>

          <button type="submit" class="register-form__button">
            Register
          </button>
        </form>

        <div class="register-card__footer">
          <span>Already have an account?</span>
          <a routerLink="/login">Login here</a>
        </div>
      </div>

    </div>
  </section>
</main>

<app-footer></app-footer>
